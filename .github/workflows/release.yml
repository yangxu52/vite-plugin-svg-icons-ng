name: Release Package

on:
  push:
    tags:
      - 'v*.*.*'
      - '*@*.*.*'

permissions:
  id-token: write
  contents: write

jobs:
  release-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve package from tag
        id: package
        run: node scripts/resolve-release.mjs --tag "${GITHUB_REF_NAME}"

      - name: Build package
        run: pnpm --filter "./packages/${{ steps.package.outputs.dir }}" run build

      - name: Publish package
        run: pnpm --filter "./packages/${{ steps.package.outputs.dir }}" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release for tag
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.package.outputs.name }} v${{ steps.package.outputs.version }}
          prerelease: ${{ steps.package.outputs.prerelease == 'true' }}
          body: |
            Please refer to [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/packages/${{ steps.package.outputs.dir }}/CHANGELOG.md) for details.
